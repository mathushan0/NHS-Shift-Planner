name: Build iOS (Production)

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS build profile'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - preview

concurrency:
  group: build-ios-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-ios:
    name: EAS Build — iOS ${{ inputs.profile || 'production' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Run TypeScript type check
        run: npm run ts:check

      - name: EAS Build — iOS
        run: |
          PROFILE="${{ inputs.profile || 'production' }}"
          eas build \
            --platform ios \
            --profile "$PROFILE" \
            --non-interactive \
            --no-wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          APP_VARIANT: ${{ inputs.profile == 'preview' && 'preview' || 'production' }}

