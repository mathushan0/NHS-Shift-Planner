# Supabase Project Configuration
# NHS Shift Planner
# Documentation: https://supabase.com/docs/guides/cli/config

[project]
project_id = "nhs-shift-planner"

[api]
enabled = true
# Port for local Supabase API
port = 54321
# Schemas to expose via REST API
schemas = ["public", "graphql_public"]
# Extra schemas to add to the search path
extra_search_path = ["public", "extensions"]
# Max rows returned by a single REST request
max_rows = 1000

[api.tls]
enabled = false

[db]
# Port for local Postgres
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true
ip_version = "IPv6"
max_header_length = 4096

[studio]
enabled = true
# Port for local Supabase Studio UI
port = 54323
api_url = "http://127.0.0.1"
openai_api_key = "env(OPENAI_API_KEY)"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"
# NHS Shift Planner doesn't use storage extensively, but keep enabled for profile photos (V2)

[storage.image_transformation]
enabled = true

[auth]
enabled = true
# JWT secret used to sign tokens (auto-generated for local dev)
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = [
  "nhsshiftplanner://",
  "exp+nhs-shift-planner://",
  "http://localhost:3000"
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = true
minimum_password_length = 8
# Disabling phone auth — email only for V1
enable_phone_signup = false
enable_phone_autoconfirm = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false  # Disable for local dev; enable in production

[auth.sms]
enable_signup = false
enable_confirmations = false

[auth.external.apple]
enabled = false

[auth.external.google]
enabled = false

[edge_runtime]
enabled = true
policy = "per_worker"
inspector_port = 8083

[analytics]
enabled = false
# No analytics for NHS Shift Planner — privacy-first approach

[experimental]
orioledb_version = ""
s3_host = "env(S3_HOST)"
s3_region = "env(S3_REGION)"
s3_access_key = "env(S3_ACCESS_KEY)"
s3_secret_key = "env(S3_SECRET_KEY)"
